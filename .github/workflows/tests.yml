name: CI - Ejecutar Pruebas

# Se ejecuta en push y pull request hacia main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Build y Tests con Maven
    runs-on: ubuntu-latest

    steps:
      # Clonar el repositorio
      - name: Checkout del código fuente
        uses: actions/checkout@v4

      # Configurar Java 21 con cache de Maven
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Ejecutar pruebas de Maven
      - name: Ejecutar pruebas con Maven
        run: mvn test --no-transfer-progress

      # Publicar reportes de pruebas (artifact)
      - name: Publicar reporte de pruebas (Surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/